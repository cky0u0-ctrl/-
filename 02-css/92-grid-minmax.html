<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .wrap {
            background: pink;
            padding: 10px;
            display: grid;
            /* grid-template-columns: repeat(3, 1fr); */
            grid-template-columns: repeat(3, minmax(100px, auto));
            /* 반응형으로 내용물과 칸까지 고정 (최소값설정) */
            grid-template-rows: repeat(3, minmax(100px, auto));
        }


        .wrap>div {
            background-color: aquamarine;
            border: 1px solid;
        }
    </style>
</head>

<body>
    <div class="wrap">
        <div class="grid1">1</div>
        <div class="grid2">동해물과 백두산이 마르고 닳도록
            하느님이 보우하사 우리나라 만세
            무궁화 삼천리 화려강산
            대한사람 대한으로 길이 보전하세.
        </div>
        <div class="grid3">3</div>
        <div class="grid4">4</div>
        <div class="grid5">5</div>
        <div class="grid6">6</div>
        <div class="grid7">7</div>
        <div class="grid8">8</div>
        <div class="grid9">9</div>

</body>

</html>
