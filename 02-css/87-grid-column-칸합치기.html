<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .wrap,
        .wraprow {
            background: skyblue;
            padding: 10px;
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            /* 세줄 같은 크기로 만들기~ */
            gap: 10px;
        }

        .wrap>div,
        .wraprow>div {
            background: olive;
            border: 1px solid;
            padding: 20px;
        }

        .wrap>.grid1 {
            /* grid-column-start: 1;
            grid-column-end: 3; */
            /* 첫째줄~셋째줄까지 차지 */
            /* 시작위치~끝위치 : 칸합치기 */
            grid-column: 1/3;
        }



        .wraprow>.grid1 .grid {}
    </style>
</head>

<body>
    <h1>
        grid-coiumn

    </h1>

    <p>그리드 칸 합치기</p>
    <div class="wrap">
        <div class="grid1">1</div>
        <div class="grid2">2</div>
        <div class="grid3">3</div>
        <div class="grid4">4</div>
        <div class="grid5">5</div>
        <div class="grid6">6</div>
        <div class="grid7">7</div>
        <div class="grid8">8</div>

    </div>
    <h1>grid-row</h1>

    <p>그리드 줄 합치기</p>
    <div class="wraprow">
        <div class="grid1">1</div>
        <div class="grid2">2</div>
        <div class="grid3">3</div>
        <div class="grid4">4</div>
        <div class="grid5">5</div>
        <div class="grid6">6</div>
        <div class="grid7">7</div>
        <div class="grid8">8</div>

    </div>

    <!-- 그리드이용하면 그룹안묶인거 묶기가능함? -->

</body>

</html>
