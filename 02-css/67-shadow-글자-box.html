<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        h2 {
            font-size: 100px;
        }

        .text1 {
            text-shadow: 3px 5px 10px red;
        }

        .text2 {
            text-shadow: -5px -10px 10px blue;
        }

        .box {
            width: 200px;
            height: 200px;
            background: #ccc;
            box-shadow: 5px 10px 5px 5px green inset;

        }
    </style>
</head>

<body>
    <h1>그림자</h1>
    <h2 class="text1">text-shadow</h2>
    <h2 class="text2">box-shadow</h2>
    <p>x y blur spread color 위치</p>

    <div class="box"></div>
</body>

</html>
