<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .wrap {
            width: 600px;
            background: pink;
            display: flex;
            justify-content: space-between;
        }

        .wrap>div {
            height: 100px;
            border: 1px solid;
        }

        .box1 {
            width: 24%;
        }

        .box2 {
            width: 48%;
            order: 2;
        }

        .box3 {
            width: 24%;
            order: 1;
        }

        /* 이름 명령어 숫자순서로 지정
        앞 태그도 오더 안주면 안먹음 */
    </style>
</head>

<body>
    <h1>order</h1>
    <p>부모가 display:flex된 경우</p>
    <p>자식들의 순서를 변경할때 사용한다</p>
    <p>기본은 0 숫자가 클수록 뒤로</p>

    <div class="wrap">
        <div class="box1">box1</div>
        <div class="box2">box2</div>
        <div class="box3">box3</div>
    </div>
</body>

</html>
