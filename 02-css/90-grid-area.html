<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .wrap {
            background: skyblue;
            padding: 10px;
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            /* 세줄 같은 크기로 만들기~ */

        }


        .wrap>div {
            background: palegreen;
            border: 1px solid;
            padding: 10px
        }


        .wrap>.grid2 {
            /* grid-row: 1/3;
            grid-column: 2/5; */
            /* 
            grid-column: span 3;
            grid-row: span 2; */

            /* grid-ara: row시작 / column시작 / row끝 /column끝 */
            grid-area: 1/2/3/5;

        }
    </style>
</head>

<body>
    <h1>혼자 칸줄합치기 실습</h1>
    <div class="wrap">
        <div class="grid1">1</div>
        <div class="grid2">2</div>
        <div class="grid3">3</div>
        <div class="grid4">4</div>
        <div class="grid5">5</div>
        <div class="grid6">6</div>
        <div class="grid7">7</div>
        <div class="grid8">8</div>
        <div class="grid9">9</div>
        <div class="grid10">10</div>
    </div>
</body>
</body>

</html>
