<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        p {
            background: pink;
        }

        .none {
            display: none;
        }

        .vis {
            visibility: hidden;
        }
    </style>
</head>

<body>
    <h1 class="none">display</h1>
    <p>none 영원히 사라지는것 = 매우중요!!</p>
    <hr>

    <h1 class="vis">visibility</h1>
    <p>눈에만 안보임, 공간 살아있음 </p>
    <hr>
</body>

</html>
