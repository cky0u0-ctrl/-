<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <style>
        .wrap>div {
            width: 100px;
            height: 100px;
            background: blue;
            margin: 10px;

            transition: 1s;
        }

        .wrap>div:hover {
            transform: rotate(360deg);
        }

        .wrap>.box2 {
            transform-origin: right center;
        }

        .wrap>.box3 {
            transform-origin: 100% 100%;
        }

        .list {
            display: flex;
            gap: 20px;
        }

        .list>li {
            border: 1px solid;
            padding: 10px 30px;
            transition: 0.5s;
        }

        .list>li:hover {
            transform: scale(1.8);
        }

        .list>li:first-child {
            transform-origin: 100% 50%;
        }

        .list>li:last-child {
            transform-origin: 0% center;
        }
    </style>
</head>

<body>
    <h1>transform origin</h1>
    <p>중심점의 위치를 이동할때 사용한다. 기본은 중심</p>
    <div class="wrap">
        <div class="box1">box1</div>
        <div class="box2">box2</div>
        <div class="box3">box3</div>
    </div>
    <hr>
    <ul class="list">
        <li>list1</li>
        <li>list2</li>
        <li>list3</li>
    </ul>
</body>

</html>
