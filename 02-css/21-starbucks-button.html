<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .btn-buddy>a {
            border: 2px solid #9e0001;
            display: block;
            width: 160px;
            height: 40px;
            text-decoration: none;
            color: #9e0001;
            text-align: center;
            line-height: 40px;
            /* 위아래 간격유지할때도 사용 */
        }

        /* 마우스가 호버되면 배경색, 글자흰색, 밑줄 */
        .btn-buddy>a:hover {
            background-color: #9e0001;
            color: #fff;
            text-decoration: underline;
        }
    </style>
</head>

<body>
    <h1>스타벅스 버튼</h1>
    <p class="btn-buddy"><a href="#">자세히 보기</a></p>
</body>

</html>
