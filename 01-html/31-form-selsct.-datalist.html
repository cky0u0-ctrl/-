<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>

    <h1>select</h1>
    <p>여러개의 요소중 하나를 선택할때 사용한다. 드롭다운목록</p>
    <label>전화번호</label>
    <select>
        <!-- option*5 -->
        <option value="02">02</option>
        <option value="032">032</option>
        <option value="054">054</option>
        <option value="031">031</option>
        <option value="070">070</option>
    </select><br>

    <select multiple>
        <option value="02">02</option>
        <option value="032">032</option>
        <option value="054">054</option>
        <option value="031">031</option>
        <option value="070">070</option>
    </select><br>

    <p>optgroup - 옵션을 그룹으로 묶어서 관리할때 사용</p>

    <p>좋아하는 음료수를 선택하세요
    </p>
    <select name="" id="">
        <optgroup label="커피">
            <option value="">아메리카노</option>
            <option value="">라떼</option>
            <option value="">에스프레소</option>
        </optgroup>

        <optgroup label="티">
            <option value="">아이스티</option>
            <option value="">레몬티</option>
            <option value="">민트티</option>
        </optgroup>
    </select>

    <h1>data list</h1>
    <p>여러개의 요소중 하나를 선택할때 드롭다운목록 + 글자를 입력</p>
    <p>input 태그의 list속성값과 datalist의 id값이 일치해야된다</p>

    <label>당신이 좋아하는 음료수를 선택하세요</label>
    <input type="text" list="drink">
    <datalist id="drink">
        <option value="아아">아아</option>
        <option value="라떼">라떼</option>
        <option value="에스프레소">에스프레소</option>
    </datalist>

</body>

</html>
