<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>
    <h1>회원가입</h1>
    <form name="mamber" method="get" action="./welcome.html">
        이름
        <input type="text" id="uName" name="uName" value="홍길동"><br>

        <label for="uId">아이디</label>
        <input type="text" id="uId" name="uId" placeholder="아이디는 영문자로 입력"><br>

        <table>비밀번호 <input type="password" name="uPass"></table><br>

        성별
        <label> 남자<input type="radio" name="gender"></label>
        <label>여자<input type="radio" name="gender"></label><br>

        취미
        <label>운동<input type="checkbox" name="health"></label>
        <label>필라테스<input type="checkbox" name="pilates" checked></label>
        <label>잠자기<input type="checkbox" name="sleep"></label><br>


        <label>사진<input type="file"></label><br>

        <label for="tel">전화번호</label>
        <input for="tel" maxlength="4" size="4">-
        <input title="전화번호 중간자리" maxlength="4" size="4">-
        <input title="전화번호 마지막 자리" maxlength="4" size="4"><br>

        <input type="submit" value="회원가입">
        <input type="reset" value="취소">
        <input type="image" src="./images/imgi_8_sns_smartstore.png" alt="">
    </form>
</body>

</html>
