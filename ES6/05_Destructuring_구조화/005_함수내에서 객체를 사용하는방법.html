<!DOCTYPE html>
<html>

  <body>

    <p id="demo"></p>

    <script>
      // 함수 내에서 객체를 사용하는 새로운 방법, 차량 정보를 담고 있는 객체 생성
      const vehicleOne = {
        brand: 'Ford',
        model: 'Mustang',
        type: 'car',
        year: 2021, 
        color: 'red'
      }

      //객체를 함수에 전달
      myVehicle(vehicleOne);
 
      //객체를 매개변수로 받을 때 구조 분해(destructuring)를 사용, 객체의 속성만 가져옴
      function myVehicle({type, color, brand, model}) {
        const message = 'My ' + type + ' is a ' + color + ' ' + brand + ' ' + model + '.';

        document.getElementById("demo").innerHTML = message;
      }
    </script>

  </body>
</html>
