<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script>
        // 특정 날짜에 대한 정보 얻어오기
        // 6월 18일
        let dDay = new Date(2026, 5, 18);
        console.log(dDay);

        // 오늘 날짜 정보
        let today = new Date();

        // 디데이 구하기
        // 특정날짜 - 오늘의 날짜
        let diff = dDay - today;
        console.log(diff);// ms를 나타냄

        // ms ->일로 계산
        // 24*60*60*1000
        let count = diff / (24 * 60 * 60 * 1000);
        console.log(count);
        // 평일
        // 총일수 - 총일수/7*2
        console.log(count - count / 7 * 2);




    </script>
</head>
