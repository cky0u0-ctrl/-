<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script>
        // 연결 연산에 필요한 변수 만들기
        let nation = "korea";
        let city = "seoul"
        let year = 2026;
        let month = 2;

        // 숫자+숫자 =>산술연산
        console.log(year + month);
        // 숫자+문자 
        console.log(year + city);
        // 문자+숫자
        console.log(nation + year);
        // 문자+문자
        console.log(nation + city);

        let dan = 9;
        let num = 2;
        // 9 * 2 = 18 (문자를 이용한 산수일때 "문자값" 더해서연결)
        console.log(dan + "*" + num + " = " + dan * num);






    </script>
</head>




<body>
    <h1>연결연산자</h1>
    <p>+ : +를 기준으로 앞뒤로 문자가 하나 이상오면 연결의 의미로 사용됨</p>
</body>

</html>
