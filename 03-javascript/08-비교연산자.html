<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script>
        // 숫자와 문자를 저장할 변수 만들기
        let num1 = 10;
        let num2 = 20;
        let str1 = "10";

        // num1>num2 보다 큰지 비교;
        console.log(num1 > num2); // false
        // num2>=num1 보다 크거나 같으냐
        console.log(num2 >= num1);// true
        // num1 == str1 같으냐
        console.log(num1 == str1);// true
        // num1 === str1 타입도 비교
        console.log(num1 === str1); // falese

        // num1 !== str1
        console.log(num1 !== str1);// true
        // null undefined
        console.log(null == undefined);// true


    </script>
</head>

<body>
    <h1>비교연산자</h1>
    <p>크거나 ,작거나, 같거나, 다르거나</p>
    <p>비교 결과는 true, false를 가진다</p>



</body>

</html>
