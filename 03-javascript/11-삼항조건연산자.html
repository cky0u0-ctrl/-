<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script>
        // 사용자로부터 나이를 입력 받아서
        // 입력한 나이가 30보다 크면 '어른'
        // 작으면 '어린이?' 출력되도록
        let userAge = prompt('당신의 나이를 입력하세요 , "예를 들어 30" ')
        console.log(userAge);

        userAge >= 30 ? document.write('어른') : document.writeln('어린이')



    </script>
</head>

<body>
    <p>콘솔로 할당량 확인가능함</p>
</body>

</html>
