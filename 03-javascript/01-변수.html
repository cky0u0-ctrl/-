<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script>
        // 이름,나이,성별,취미를 저장하는 변수 만들기
        // var 변수명 = 데이터값;
        // 변수명 규칙
        // 소문자, &,_로 시작하고, 대소문자 구분, 숫자사용가능
        var userName = "홍길동";
        var userAge = 20;
        // true(참)=> 1 , false(거짓) => 0
        // 성별 홀수 남자 , 짝수 여자
        var userGender = true;
        // 데이터값 없이 선언 - undefined라고 한다
        var userHobby;
        console.log(userName);
        console.log(userAge);
        console.log(userGender);
        console.log(userHobby);

        // 재할당 가능
        userName = "김철수";
        console.log(userName);

        //재선언
        var userName = "이영희 ";
        console.log(userName);
        // userAge 데이터 배우기

        userAge = null;
        console.log(userAge);

        // let 재선언 불가능,재할당은 가능
        // 나라, 도시를 저장하는 변수 만들기
        let country = "대한민국";
        let city = "서울";
        console.log(country);
        console.log(city);

        // let country = "미국";
        country = "미국";
        console.log(country);

        // 3. const로 변수 선언하기
        //    재선언,할당 불가
        // 다른 언어는 변수를 대문자로 


        const PI = 3.14;
        console.log(PI);

        // const PI = 3.145235;
        PI = 111111;

        // 콘설트 가장 마니사용-배너이동 

    </script>

</head>

<body>
    <h1>변수</h1>
    <p>변할수 있는 데이터를 저장하는 공간</p>
    <p>변수는 var, let , const로 선언하여 사용한다</p>
    <p>1. var 재선언, 재할당이 가능</p>
    <p>2. let 재선언 안됨, 재할당 가능
        - 위에서 사용한 변수를 덮어쓰는 오류를 방지할 수 있다</p>
    <p>3. const 재선언,재할당 둘다 안됨
        - 상수를 저장할때 사용한다
    </p>

</body>

</html>
