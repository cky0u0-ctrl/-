<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script>
        // window의 너비값과 높이값 구하기
        // outerWidth(화면전체), innerWidth(사용가능너비)
        document.write(`outerWidth:${window.outerWidth}<br>`)
        document.write(`innerWidth : ${window.innerWidth}<br>`)
        document.write(`outerHeight: ${window.outerHeight}<br>`)
        document.write(`innerHeight: ${innerHeight}<br>`)
    </script>
</head>

<body>
    <h1>width,height</h1>
</body>

</html>
