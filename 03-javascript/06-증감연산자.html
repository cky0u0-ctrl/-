<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script>
        // 증감연산에 사용할 변수 선언하기
        let num1 = 10;
        let num2 = 5;

        // num1의 값을 1증가시켜서 다시 num1에 넣기
        num1++;
        console.log(num1);// 11

        ++num1;
        console.log(num1);// 12

        // 증감연산자는 다른 연산자와 함께 사용시 주의
        console.log(++num1);// 13
        console.log(num1++);   // 13 콘솔먼저읽힘 차이점?
        console.log(num1); // 14

        // num2의 값을 1감소시켜서 num2에 넣어라
        --num2;
        console.log(num2);// 4
        num2--;
        console.log(num2);// 3
    </script>
</head>

<body>
    <h1>증감연산자 / 배너사용시 무조건이용</h1>
    <p>++ : 1씩 증가</p>
    <p>-- : 1씩 감소</p>




</body>

</html>
