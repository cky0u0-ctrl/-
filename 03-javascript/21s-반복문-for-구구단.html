<html lang="ko">

<head>

    <title>Document</title>
    <script>
        // 2단구하기
        for (let i = 1; i <= 9; i++) {
            // document.write(2 + "*" + i + "=" + 2 * i + "<br>")
            document.write(`2*${i}=${2 * i}<br>`)
        }

        // 3단구하기
        for (let i = 1; i <= 9; i++) {
            // document.write(2 + "*" + i + "=" + 2 * i + "<br>")
            document.write(`3*${i}=${3 * i}<br>`)
        }

        // 4단구하기
        for (let i = 1; i <= 9; i++) {
            // document.write(2 + "*" + i + "=" + 2 * i + "<br>")
            document.write(`4*${i}=${4 * i}<br>`)
        }


        // 5단구하기

            // document.write(2 + "*" + i + "=" + 2 * i + "<br>")
            document.write(`5*${a}=${5 * a}<br>`)
        }

        // 6단구하기
        for (let i = 1; i <= 9; i++) {
            // document.write(2 + "*" + i + "=" + 2 * i + "<br>")
            document.write(`6*${i}=${6 * i}<br>`)
        }
