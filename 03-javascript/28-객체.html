<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script>
        // TV객체 만들기
        // 리터럴방식으로 객체 생성하기
        // react component 방식과 유사하다

        let TV = {
            brand: "삼성",
            inch: 80,
            flat: "flat",
            style: "벽걸이",

            on: function () {
                alert("TV on");
            },
            off: function () {
                alert("TV off");
            }

        }

        console.log(TV.brand);
        TV.on();

    </script>

    <h1>객체</h1>
