<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script>
        // 부모 클래스
        // 변수 : 이름, 나이
        // 메서드 : 나의 이름은 누구이고 몇살입니다
        class Person {
            constructor(name1, age1) {
                this.name = name1;
                this.age = age1;
            }
            inrto() {
                console.log(`나의 이름은 ${this.name}이고 ${this.age}살 입니다`)
            }
        }


        // 자식 클래스
        // 부모로부터 이름 , 나이를 상속 받아서 사용
        // 변수 : 직업추가




        // 메서드 : 부모의 메서드 그대로 실행
        // 나의 직업은 직업입니다
        class Worker extends Person {
            constructor(name2, age2, job2) {
                super(name2, age2);
                this.job = job2;
            }
            intro() {
                super.intro();
                console.log(`나의 이름은 ${this.name}, 나의 직업은 ${this.job}입니다`)
            }

        }

        let kim = new Person("김철수", 30);
        kim.inrto();

        let park = new Worker("박미리", 20, "디자이너");

        park.intro();



    </script>
</head>

<body>

    <h1>class - super , extends</h1>
    <p>부모의 속성과 메서드를 상속받아서, 사용할 때 </p>


</body>

</html>
