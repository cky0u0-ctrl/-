<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script>
        // 구구단 2~9단까지
        // 단을 체크해줄 for
        for (i = 2; i <= 9; i++) {
            document.write(`<h1>${i}단</h1>`);
            // 곱해지는 숫자 for
            for (j = 1; j <= 9; j++) {
                document.write(`${i}*${j}=${i * j}<br>`)
            }
        }

    </script>
</head>

<body>

</body>

</html>
