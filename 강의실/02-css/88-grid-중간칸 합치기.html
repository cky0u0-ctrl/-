<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .wrap {
            background: skyblue;
            padding: 10px;
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            /* 세줄 같은 크기로 만들기~ */
            gap: 10px;
        }


        .wrap>div {
            background: palegreen;
            border: 1px solid;
            padding: 20px;

        }

        .wrap>.grid2 {
            grid-row: 1/3;
            grid-column: 2;
            /* 위치지정 명령어 */

        }
    </style>
</head>

<body>
    <h1>grid : 중간칸 합치기</h1>
    <div class="wrap">
        <div class="grid1">1</div>
        <div class="grid2">2</div>
        <div class="grid3">3</div>
        <div class="grid4">4</div>
        <div class="grid5">5</div>
    </div>
</body>

</html>
