<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        div {
            width: 70px;
            height: 70px;
            background: burlywood;
            border: 2px solid;
            transition: 1s;
            /* 공통사항에 트랜지션 주기 */

        }

        /* 타깃된 요소는 다시 원상복구x 새로고침! */
        /* .box1위치 이동 a를 클릭하면 */
        /*a href="아이디주소"  */
        #box1:target {
            transform: translate(500px, 200px);
        }

        /* box2에 마우스를 호버하면 크기를 2배 */
        .box2:hover {
            transform: scale(2);


        }

        /* .box3 호버하면 회전 180도 */
        .box3:hover {
            transform: rotate(180deg);
        }

        /* .box4 기울기 */
        .box4:hover {
            transform: skewX(45deg);
        }

        /* .box5 크기는 2배 회전 360도 */

        .box5:hover {
            transform: scale(2) rotate(350deg);


        }
    </style>
</head>

<body>
    <h1>transform</h1>
    <p>요소들의 속성을 변경시킬때 사용한다</p>
    <p>위치, 크기, 기울기, 회전</p>

    <a href="#box1">box1</a>
    <hr>
    <div id="box1">box1</div>
    <!-- 아이디값 선택자 차이점 -->
    <div class="box2">box2</div>
    <div class="box3">box3</div>
    <div class="box4">box4</div>
    <div class="box5">box5</div>
</body>

</html>
