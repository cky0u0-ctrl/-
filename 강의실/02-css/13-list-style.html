<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .list>li

        /* {list-style-type: circle;}빈원  */
            {
            list-style-type: square;
            list-style-position: inside;
            list-style-image: url();
        }

        .gnd>li {
            list-style: none;
        }

        ol>li {
            list-style: upper-roman;
        }
    </style>
</head>

<body>
    <h1>list style</h1>
    <p>목록에 대한 css</p>
    <ul class="list">
        <li>list1</li>
        <li>list2</li>
        <li>list3</li>
        <li>list4</li>
        <li>list5</li>
    </ul>
    <ul class="gnb">
        <li>gnb1</li>
        <li>gnb2</li>
        <li>gnb3</li>
        <li>gnb4</li>
        <li>gnb5</li>
    </ul>
    <ol class="menu">
        <li>menu1</li>
        <li>menu2</li>
        <li>menu3</li>
        <li>menu4</li>
        <li>menu5</li>
    </ol>
</body>

</html>
