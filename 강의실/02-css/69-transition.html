<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .box {
            width: 100px;
            height: 100px;
            background: pink;
            transition-duration: 0.5s;
            /* 애니메이션 지연시키기 - 스르륵 */


        }

        .box:hover {
            width: 200px;
            height: 200px;
            background: yellowgreen;
            transition-property: width;
            /* 다른거 고정하고 너비만 변경 */
            transition-delay: 0.2s;
            /* 기다렷다변경 */
        }
    </style>
</head>

<body>
    <h1>tranfition</h1>
    <p>중간 과정을 만들어줄때 사용한다</p>
    <div class="box"></div>
</body>

</html>
