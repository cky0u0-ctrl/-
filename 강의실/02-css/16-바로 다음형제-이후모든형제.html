<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        /* h1 바로 다음에 오는 h2에만 글자색변경 */
        h1+h2 {
            color: blue;
        }

        /* h1이후에 오는 p에 배경색추가 */
        h1~p {
            background-color: lightcyan;
        }
    </style>
</head>

<body>
    <p>여기도 p 있어요!!</p>
    <h1>형제선택자</h1>
    <h2>
        바로 다음 형제 +
    </h2>
    <p>바로 다음에 오는 형제 하나 선택하기</p>

    <h2>이후 형제~</h2>
    <p>이후에 오는 모든 형제들 선택</p>

    <div>
        <p>같은줄에 있는 형제 P태그아니라 적용안됨</p>
    </div>

</body>

</html>
