<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>폼 기타</title>
</head>

<body>
    <h1>폼그룹</h1>
    <p>폼그룹으로 묶어줄때 fieldset , 제목 legend</p>
    <form>
        <fieldset>
            <legend>필수요소</legend>
            <label>아이디<input></label><br>
            <label>비밀번호<input type="password"></label>
        </fieldset>

        <fieldset>
            <legend>선택요소</legend>
            취미
            <label>독서<input type="checkbox"></label>
            <label>운동<input type="checkbox"></label>
        </fieldset>
    </form>
    <h1>여러줄 입력</h1>
    <textarea rows="s" cols="60"></textarea>

    <h1>버튼</h1>
    <button>링크</button>


</body>

</html>
