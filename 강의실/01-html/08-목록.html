<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>목록</title>
</head>

<body>
    <h1>목록</h1>
    <p>목차를 만들때 사용한다</p>
    <p>웹표준에서는 메뉴, 배너를 만들때 사용</p>
    <p>순서가 없는 목록, 순서가 있는 목록, 정의형 목록</p>
    <h2>순서가 없는 목록</h2>
    <p>브라우저의 종류</p>
    <ul>
        <li>크롬</li>
        <li>웨일온</li>
        <li>익스<ul>
                <li>익스11</li>
                <li>익스10</li>
            </ul>
        </li>
        <li>사파리</li>
        <li>파이어폭스</li>
    </ul>

    <h2>순서가 있는 목록</h2>
    <ol>
        <li>크롬</li>
        <li>웨일온</li>
        <li>익스<ol>
                <li>익스11</li>
                <li>익스10</li>
            </ol>
        </li>
        <li>사파리</li>
    </ol>
</body>

</html>
