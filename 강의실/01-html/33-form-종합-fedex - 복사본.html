<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        table,
        th,
        td {
            border: 1px solid black;
        }
    </style>
</head>


<body>
    <h1>수화물 정보</h1>
    <!-- form name="mamber" method="get" action="./welcome.html" -->
    <form>
        <!-- table>tr*7>th+td -->
        <table>
            <tr>
                <th><label for="Pcount">패키지수</label></th>
                <td><input type="number" value="1" min="1" id="Pcount"></td>
            </tr>
            <tr>
                <th>패키지가 일치합니까?</th>
                <td> <label> <input type="radio" name="package" checked>예</label>
                    <label><input type="radio" name="package">아니오</label><br>
                </td>
            </tr>
            <tr>
                <th><label for="weight">패키지별 무게</label></th>
                <td>
                    <!-- select>option*2 -->
                    <input id="weight">
                    <select title="패치별 무게 단위">
                        <option value="그램">그램</option>
                        <option value="kg">kg</option>
                    </select>
                </td>
            </tr>
            <tr>
                <th></th>
                <td> <label><input type="checkbox"></label>고객번호를 사용하여 전송</td>
            </tr>
            <tr>
                <th><label for=pickup>픽업/방문접수</label></th>
                <td>
                    <select name="pickup" id="pickup">
                        <option value="방문">방문</option>
                        <option value="픽업" selected>픽업</option>
                    </select>
                </td>
            </tr>
            <tr>
                <th><label for="date">발송날짜</label></th>
                <td> <input type="date" id="date"></td>
            </tr>
            <tr>
                <th colspan="2">

                    <input type="submit" value="빠른견적받기">
                    <input type="button" value="상세 견적받기">
                </th>

                <!-- <td></td> -->
            </tr>
        </table>
    </form>

</html>
