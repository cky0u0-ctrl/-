<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>테이블 제목 요약</title>
    <style>
        table,
        th,
        td {
            border: 1px solid black;
        }
    </style>
</head>

<body>
    <h1>테이블 제목/요약</h1>
    <p>caption 두개는 같이 사용할수 없다</p>
    <figure>
        <table>
            <caption>테이블 제목 - 공부 일정표</caption>
            <tr>
                <th>일</th>
                <th>월</th>
                <th>화</th>
                <th>수</th>
                <th>목</th>
                <th>금</th>
                <th>토</th>
            </tr>

            <tr>
                <td>&nbsp;</td>
                <td>html</td>
                <td>css</td>
                <td>javascript</td>
                <td>react</td>
                <td>fiama</td>
                <td>&nbsp;</td>
            </tr>
        </table>
        <figcaption>[표]1-1 테이블 요약과 제목</figcaption>
    </figure>
</body>

</html>
