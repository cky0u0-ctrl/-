<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script>
        // 사람 오브젝트
        let person = {
            name: "홍길동",
            age: 20,
            hobby: ["독서", "운동"]
        }

        console.log(person)
        // 데이터를 전송용으로 사용하려면 json으로 변경해야한다
        // JSON.stringify(오브젝트)
        let data = JSON.stringify(person);
        console.log(data); 
    </script>
</head>
