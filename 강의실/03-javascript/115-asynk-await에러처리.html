<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script>
        async function getData() {
            try {
                let res = await fetch("잘못된 주소")
                console.log(res)
                let data = await res.json();
                console.log(data)
            } catch (e) {
                console.log("에러발생")
            }
        }
        getData();
        console.log("계속 실행...")
    </script>
</head>

<body>
    <h1>asyn await에러처리</h1>
    <p>에러처리 try~catch로 한다</p>
    <pre>
        async 함수{
            try{외부데이터 불러오기
            데이터 처리 }
            catch(){에러가 발생한 경우 처리할 문장
            }
        }
    </pre>
</body>

</html>
