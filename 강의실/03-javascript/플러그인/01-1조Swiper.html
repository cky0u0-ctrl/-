<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="./css/common.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@12/swiper-bundle.min.css" />
    <link rel="stylesheet" href="./css/swiper.css">
    <link rel="stylesheet" href="./css/1team.css">
</head>

<body>
    <div class="main-slider-wrap">
        <div class="swiper main-slider">
            <ul class="swiper-wrapper">
                <li class="swiper-slide">

                    <div class="img-box"><img src="./images/F1-THE-MOVIE-poster.jpg" alt=""></div>
                </li>

                <li class="swiper-slide">
                    <div class="img-box"><img src="./images/made-in-korea-poster.png" alt=""></div>
                </li>
                <li class="swiper-slide">
                    <div class="img-box"><img src="./images/malcolm-poster.jpg" alt=""></div>
                </li>
            </ul>

            <div class="swiper-pagination"></div>

            <div class="swiper-button-next"></div>
            <div class="swiper-button-prev"></div>
        </div>
    </div>

    <!-- Swiper JS -->
    <script src="https://cdn.jsdelivr.net/npm/swiper@12/swiper-bundle.min.js"></script>

    <!-- Initialize Swiper -->
    <script>
        var swiper = new Swiper(".main-slider", {
            //    pager

            pagination: {
                el: ".swiper-pagination",
                // type: "progressbar"
                type: "fraction"
            },
            // 왼쪽 오른쪽 화살표
            navigation: {
                nextEl: ".swiper-button-next",
                prevEl: ".swiper-button-prev",
            },

            // 자동실행
            autoplay: {
                delay: 2500,

            },
            // fede효과로 변경, 기본이 슬라이드
            effect: "fade"

        });
    </script>
</body>

</html>
