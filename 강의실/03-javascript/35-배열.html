<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script>
        // 과일의 종류를 저장할 배열만들기
        let fruits1 = new Array();
        fruits1[0] = "사과";
        fruits1[1] = "배";
        document.write(fruits1 + "<br>");
        // 
        let fruits2 = new Array("샤인머스캣", "수박", "레드향");
        document.write(fruits2 + "<br>");

        //음료의 종류
        let drink = ["커피", "라떼"];
        document.write(drink)

    </script>

</head>

<body>
    <h1>배열</h1>
    <p>하나의 변수명에 여러개의 데이터를 저장할때 </p>
    <p>데이터의 구분은 방번호로 구분 , 방번호는 0부터 시작</p>
</body>

</html>
