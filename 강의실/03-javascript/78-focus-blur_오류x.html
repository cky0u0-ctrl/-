<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>focus-blur</title>
    <style>
        .myForm p {
            position: relative;
        }

        .myForm p>label {
            position: absolute;
            left: 10px;
            top: 50%;
            transform: translateY(-50%);
        }

        .myForm p>input {
            outline: none;
            border: 1px solid #ccc;
            border-radius: 4px;
            line-height: 40px;
        }

        .myForm p>input.active {
            border-color: salmon;
        }
    </style>
    <script>
        document.addEventListener("DOMContentLoaded", function () {
            let uInput = document.querySelectorAll(".myForm input");
            uInput.forEach((iinput) => {
                iinput.addEventListener("focus", function () {
                    this.classList.add("active");
                    this.previousElementSibling.style.display = "none";
                })
                iinput.addEventListener("blur", function () {
                    this.classList.remove("active");
                    this.previousElementSibling.style.display = "block"
                })
            })
        })
    </script>
</head>

<body>
    <form class="myForm">
        <p><label for="uId">아이디</label><input type="text" id="uId"></p>
        <p><label for="iPass">비밀번호</label><input type="text" id="uPass"></p>
        <p><label for="uName">이름</label><input type="text" id="uName"></p>
    </form>
</body>

</html>
