<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script>
        // 일정 시간후 실행문을 한번만 실행
        // 3초뒤에 콘솔창에 "3초가 지났습니다"
        setTimeout(
            () => { console.log("3초가 지났습니다") }, 3000
        )


    </script>
</head>

<body>
    <h1>setTimeout</h1>
    <p>일정 시간이 지난 후 한번만 실행</p>
    <p>setTnterval 처럼 일정 시간마다 반복해서 실행 - 재귀함수</p>
    <p>재귀호출함수 - 자기 자신을 호출</p>
</body>

</html>
