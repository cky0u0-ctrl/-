        for (let i = 1; i <= 10; i++) {
            document.write("오늘은 목요일<br>");
        }
        // 조건1 조건2 10보다작기 / 증감문+조건이 2가됨 (조건2충족) = 출력 / 없으면 아래로내려오게됨

        // 빨리와라 주말아 10~1
        for (let i = 10; i >= 1; i--) {
            // document.write("빨리와라 주말아" + i + "<br>");
            document.write(`빨리와라 주말아~ ${i}<br>`);
        }
