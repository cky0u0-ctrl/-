<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script>
        // 함수호출,이름,나이값을 함께 전달하여 그 데이터를 이용하여 내용이 출력되도록
        function 안녕(uName, uAge) {
            document.write(`${uName}야~ 안녕, 너는 ${uAge}살이 맞니??<br>`)
        }
        안녕("짱구", 5);
        안녕("흰둥이", 10);

        // 이름, 시간을 전달하여 출력
        let hi = function (이름, 시간) {
            document.write(`${이름}야,,,너는${시간}시에 일어나니<br>`)

        }

        hi("영희", 9);
        hi("철희", 10);


    </script>
</head>

<body>

</body>

</html>
