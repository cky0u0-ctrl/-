<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script>
        // 배열
        // 숫자,문자,boolean,null,undefined,array,object
        let data = [10, 5, "홍길동", "목요일", true]
        // 문자열
        let str = "es6!";

        // 객체
        let TV = {
            brand: "삼성",
            inch: 80,
            flat: "flat",
            // on: function () {
            //     alert("TV on")
            // },
            // off: function () {
            //     alert("TV off")
            // }
            on: () => {
                alert("TV on")
            },
            off: () => alert("TV off")
        }


        // for
        for (let i = 0; i < data.length; i++) {
            // document.write(data[i] + "<br>")
            document.write(`${data[i]}<br>`)
        }

        document.write("<hr>")


        // for~in
        // 배열,문자열,객체 모두 가능
        // for(순서를체크할변수 in 배열명)
        for (let i in data) {
            document.write(`${data[i]}<br>`)
        }
        document.write("<hr>")



        for (let i in str) {
            document.write(i + ".." + str[i] + "<br>")
        }

        for (let s of str) {
            document.write(s + "<br>")
        }

        document.write("<hr>")



        // for~in TV객체 출력하기
        for (let i in TV) {
            document.write(`${i} : ${TV[i]}<br>`)

        }
        document.write("<hr>")




        // for~of
        // 배열,문자열 가능, 객체에서는 사용불가
        // for(배열의 데이터를 저장할 변수 of 배열명) 
        for (let item of data) {
            document.write(`${item}<br>`)
        }

        document.write("<hr>")

        // forEach

    </script>
</head>

<body>

</body>

</html>
