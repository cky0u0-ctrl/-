<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script>
        // 전역변수
        let globalVar = "나는 전역변수, 어디든 갈수 있어~";

        function sample() {
            let localVar = "나는 지역변수~ 함수 안에서 사용할수 있어!";
            document.write(`${globalVar}<br>`)
            document.write(`${localVar}<br>`)
        }

        sample();
        document.write(`밖) ${globalVar}<br>`)
        document.write(`
밖) ${localVar}<br>`)
    </script>
</head>
