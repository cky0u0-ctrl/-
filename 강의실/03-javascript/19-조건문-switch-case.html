<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script>
        // 조건이 여러개인 경우, 값을 체크한다
        // 숫자를 입력받아서 1~7사이 숫자
        // 무지개색
        // 다른 숫자를 입력하면 "1~7사이 숫자만 허용됩니다"를 출력
        let num = prompt("1~7사이 숫자를 입력하세요", "");
        switch (num) {
            case "1": document.write("빨강")
                break;

            case "2": document.write("주황")
                break;

            case "3": document.write("노랑")
                break;

            case "4": document.write("초록")
                break;

            case "5": document.write("파랑")
                break;

            case "6": document.write("남색")
                break;

            case "7": document.write("보라")
                break;

            default: document.write("1~7사이 숫자만 허용됩니다");



        }



    </script>
</head>

<body>

</body>

</html>
