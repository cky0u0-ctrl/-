<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script>
        // 1. 과일의 종류를 저장할 배열
        // forEach로 데이터 화면에 출력하기

        let fruits = ["사과", "감", "포도", "배", "귤"];

        // 배열명. forEach((배열의 데이터를 저장할 변수, 순서변수, 배열의별칭))=>({})
        fruits.forEach((fruit) => {
            document.write(fruit, "<br>")
        })
        // // 2.색상을 저장할 배열
        // // 1번째는 빨강
        // let colors = ["빨강", "주황", "노랑", "초록", "파랑"];
        // colors.forEach((color.id)=> {document.write(`${id + 1}번째는 ${color}<br>`)
        // })

        // 3.동물의 종류를 저장할 배열
        let animals = ["고양이", "강아지", "닭"];
        // 고양이는 전체 3번째중 1번째 동물입니다
        animals.forEach((animal, i, arr) => { document.write(`${animal}는 전체 ${arr.length}개중 ${i}번째 동물입니다<br>`) })

        // 4. 점수를 저장할 배열
        // 조건에 맞는요소만 출력하기
        // 점수가 90점 이상만 찾아서 - 점수은 매우 우수
        let scores = [85, 100, 50, 60, 95];
        scores.forEach((score) => {
            if (score >= 90) {
                document.write(`${score}는 매우 우수<br>`)
            }
        })

        // 5.객체 배열
        let peoples = [
            { name: "김철수", age: 20, job: "프로그래머" },
            { name: "홍길동", age: 16, job: "의적" },
            { name: "이영희", age: 30, job: "디자이너" }]

        // 이름:김철수 나이:20 직업:프로그래머
        peoples.forEach((p) => {
            document.write(`이름:${p.name}, 나이:${p.age}, 직업:${p.job}<br>`)
        })

    </script>
</head>

<body>

</body>

</html>
