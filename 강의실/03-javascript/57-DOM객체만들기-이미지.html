<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DOM객체만들기</title>
    <script>
        document.addEventListener("DOMContendLoaded", function () {
            // 1.img 태그 생성하기
            let myImg = document.createElement("img");

            // 2.이미지 속성 추가하기
            // 2-1.방법1
            myImg.src = "./images2/bul-tit.png";
            myImg.alt = "서브웨이 아이콘";
            document.body.append(myImg);

            // 1.img 태그 생성하기
            let myImg2 = document.createElement("img");
            // 2.이미지 속성추가하기
            // 2-2.방법2
            myImg2.setAttribute("src", "./images2/marker.png");
            myImg2.setAttribute("alt", "위치 아이콘");
            document.body.append(myImg2);
        })
    </script>
</head>

<body>

</body>

</html>
